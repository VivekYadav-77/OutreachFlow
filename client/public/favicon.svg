<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <style>
      .fly {
        animation: float-plane 3s ease-in-out infinite;
        transform-origin: center;
      }
      .stars {
        animation: twinkle 2s infinite ease-in-out alternate;
      }
      @keyframes float-plane {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-6px) rotate(3deg); }
      }
      @keyframes twinkle {
        0% { opacity: 0.3; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#grad1)" />
  
  <!-- Twinkling stars -->
  <g class="stars" style="transform-origin: 20px 20px; animation-delay: 0s;">
    <circle cx="20" cy="20" r="2" fill="white" />
  </g>
  <g class="stars" style="transform-origin: 80px 30px; animation-delay: 1s;">
    <circle cx="80" cy="30" r="3" fill="white" />
  </g>
  <g class="stars" style="transform-origin: 30px 80px; animation-delay: 0.5s;">
    <circle cx="30" cy="80" r="1.5" fill="white" />
  </g>
  <g class="stars" style="transform-origin: 75px 75px; animation-delay: 1.5s;">
    <circle cx="75" cy="75" r="2.5" fill="white" />
  </g>

  <!-- Animated Paper Plane -->
  <g class="fly">
    <!-- Shadow for depth -->
    <path d="M 22 52 L 82 22 L 62 77 Z" fill="rgba(0,0,0,0.15)" />
    
    <!-- Left Wing -->
    <path d="M 20 50 L 80 20 L 45 55 Z" fill="#E2E8F0" />
    
    <!-- Right Wing -->
    <path d="M 45 55 L 80 20 L 60 75 Z" fill="#FFFFFF" />
    
    <!-- Bottom Flap -->
    <path d="M 45 55 L 50 75 L 60 75 Z" fill="#CBD5E1" />
  </g>
</svg>
